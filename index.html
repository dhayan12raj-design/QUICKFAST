<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickFast AI - Automated Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div class="max-w-md mx-auto min-h-screen bg-slate-800 shadow-2xl pb-10 overflow-hidden">
        
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-10 text-center rounded-b-[50px] shadow-2xl border-b-4 border-blue-400">
            <h1 class="text-5xl font-black italic tracking-tighter text-white drop-shadow-lg">⚡ QUICKFAST AI</h1>
            <p class="text-[10px] mt-2 font-bold opacity-80 uppercase tracking-[0.2em] text-blue-200 text-center">Fully Automated Web Engine</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest ml-1">Business Identity</label>
                <input type="text" id="bizName" placeholder="உதாரணம்: Colombo Textiles" class="w-full p-5 bg-slate-700 border-2 border-slate-600 rounded-3xl outline-none focus:border-blue-500 transition-all font-bold text-center text-xl shadow-inner">
            </div>
            
            <button onclick="aiBuild()" id="buildBtn" class="w-full bg-blue-500 hover:bg-blue-400 text-white font-black py-6 rounded-3xl shadow-[0_0_20px_rgba(59,130,246,0.5)] transform active:scale-95 transition-all text-xl uppercase tracking-wider">
                AI மூலம் உருவாக்கு 🤖
            </button>
        </div>

        <div id="aiResult" class="hidden p-6 space-y-6 animate-pulse">
            <div class="bg-slate-700 p-8 rounded-[40px] border-2 border-blue-500 text-center shadow-2xl">
                <div class="text-blue-400 mb-2 font-black text-xs uppercase tracking-widest text-center">Preview Generated</div>
                <h2 id="finalTitle" class="text-3xl font-black uppercase text-white"></h2>
                <div class="mt-4 flex flex-wrap gap-2 justify-center">
                    <span class="bg-blue-900 text-blue-300 px-3 py-1 rounded-full text-[9px] font-bold">SSL SECURED</span>
                    <span class="bg-green-900 text-green-300 px-3 py-1 rounded-full text-[9px] font-bold">.COM READY</span>
                </div>
            </div>

            <div class="bg-gradient-to-br from-indigo-600 to-blue-800 p-8 rounded-[40px] shadow-2xl border-2 border-white/20">
                <h3 class="font-black text-2xl text-yellow-400 uppercase text-center italic">Ready to Go Live?</h3>
                <p class="text-xs mt-2 opacity-90 text-center font-medium">Domain + Hosting + AI Dashboard</p>
                
                <div class="my-6 p-4 bg-white/10 rounded-2xl text-center backdrop-blur-md">
                    <p class="text-[10px] uppercase font-bold text-blue-300 tracking-widest mb-1">Total LKR (All inclusive)</p>
                    <p class="text-4xl font-black text-white italic">LKR 1,999</p>
                </div>

                <button onclick="autoPay()" class="w-full bg-yellow-400 text-slate-900 py-6 rounded-3xl font-black text-xl shadow-xl hover:bg-yellow-300 transition-all uppercase tracking-widest">
                    Checkout & Launch 🚀
                </button>
                <p class="text-[8px] mt-4 text-center opacity-60 font-bold uppercase italic text-center text-center">No Human Contact Needed • Automated Delivery</p>
            </div>
        </div>
    </div>

    <script>
        function aiBuild() {
            const name = document.getElementById('bizName').value;
            if(!name) return alert("தயவுசெய்து பெயரை உள்ளிடவும்!");
            
            document.getElementById('buildBtn').innerText = "AI Processing...";
            setTimeout(() => {
                document.getElementById('finalTitle').innerText = name;
                document.getElementById('aiResult').classList.remove('hidden');
                document.getElementById('aiResult').classList.remove('animate-pulse');
                document.getElementById('buildBtn').innerText = "AI Generation Complete ✅";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 2000);
        }

        function autoPay() {
            const name = document.getElementById('bizName').value;
            // இங்கே உங்கள் PayHere அல்லது Stripe லிங்க் வரும்
            // இப்போதைக்கு ஆட்டோமேட்டட் மெசேஜ் செட் செய்யப்பட்டுள்ளது
            alert("Redirecting to Sri Lanka Secure Payment Gateway...");
            const msg = `AUTOMATED_ORDER: ${name} | Plan: LKR 1999 | Requesting Automated Deployment.`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
