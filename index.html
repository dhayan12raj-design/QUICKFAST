<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickFast - Freemium Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl pb-10">
        <div class="bg-indigo-700 p-8 text-white rounded-b-[40px] text-center shadow-lg">
            <h1 class="text-4xl font-extrabold tracking-tighter text-yellow-400 italic">⚡ QUICKFAST</h1>
            <p class="text-xs mt-1 opacity-80 font-bold uppercase tracking-widest">3 நிமிடத்தில் உங்கள் வெப்சைட்</p>
        </div>

        <div class="p-6 space-y-4">
            <input type="text" id="bizName" placeholder="பிசினஸ் பெயர் (எ.கா: ஜேகே மொபைல்ஸ்)" class="w-full p-5 border-2 border-indigo-100 rounded-2xl outline-none focus:border-indigo-500 shadow-inner font-bold text-center">
            
            <button onclick="generate()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-xl uppercase">
                வெப்சைட் உருவாக்கு 🚀
            </button>
        </div>

        <div id="output" class="hidden p-6 space-y-6">
            
            <div class="border-2 border-gray-300 p-6 rounded-3xl bg-white relative">
                <span class="absolute top-0 right-4 bg-gray-500 text-white text-[10px] px-3 py-1 rounded-b-lg font-bold">FREE PLAN</span>
                <h2 id="freeTitle" class="text-2xl font-bold text-gray-800 uppercase"></h2>
                <p class="text-gray-500 text-sm mt-2 font-medium">எங்கள் சேவைகளுக்கு தொடர்பு கொள்ளவும்.</p>
                <div class="mt-4 pt-4 border-t border-gray-100 flex justify-between items-center text-[10px] text-gray-400 font-bold italic">
                    <span>⚡ Powered by QuickFast Free</span>
                </div>
            </div>

            <div class="bg-gradient-to-br from-yellow-400 to-orange-500 p-1 rounded-[32px] shadow-2xl transform rotate-1">
                <div class="bg-white p-6 rounded-[30px] relative overflow-hidden">
                    <span class="absolute top-0 right-4 bg-black text-yellow-400 text-[10px] px-3 py-1 rounded-b-lg font-black uppercase">PREMIUM 💎</span>
                    <h2 id="premTitle" class="text-3xl font-black text-indigo-900 uppercase tracking-tighter"></h2>
                    <p class="text-indigo-700 font-bold italic text-sm">உங்களின் பிரத்யேக பிசினஸ் தளம்!</p>
                    
                    <div class="mt-4 grid grid-cols-2 gap-2">
                        <div class="bg-indigo-50 p-3 rounded-xl text-center">
                            <p class="text-[10px] font-black text-indigo-400 uppercase">WhatsApp</p>
                            <p class="text-xs font-bold">நேரடி இணைப்பு</p>
                        </div>
                        <div class="bg-indigo-50 p-3 rounded-xl text-center text-indigo-800">
                            <p class="text-[10px] font-black text-indigo-400 uppercase">Domain</p>
                            <p class="text-xs font-bold text-indigo-800">www.பெயர்.com</p>
                        </div>
                    </div>

                    <div class="mt-6 text-center border-t pt-4">
                        <p class="text-[10px] text-gray-500 font-bold mb-2">அட்வான்ஸ் வசதிகளைப் பெற ₹99 மட்டும் செலுத்துங்கள்!</p>
                        <button onclick="payNow()" class="w-full bg-black text-white py-4 rounded-2xl font-black text-lg hover:scale-105 transition-transform">
                            உடனே ஆக்டிவேட் செய் 💳
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function generate() {
            const name = document.getElementById('bizName').value;
            if(!name) return alert("பெயரை உள்ளிடவும்!");

            document.getElementById('freeTitle').innerText = name;
            document.getElementById('premTitle').innerText = name;
            document.getElementById('output').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function payNow() {
            const name = document.getElementById('bizName').value;
            const msg = `வணக்கம்! நான் QuickFast Premium (₹99) வாங்க விரும்புகிறேன். பிசினஸ்: ${name}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
