<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickFast - Instant Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl pb-10 font-sans text-center">
        <div class="bg-blue-600 p-8 text-white rounded-b-[40px] shadow-lg">
            <h1 class="text-4xl font-black italic tracking-tighter text-yellow-300">⚡ QUICKFAST</h1>
            <p class="text-sm mt-1 font-medium opacity-90 uppercase tracking-widest">Instant Website Builder</p>
        </div>

        <div class="p-6 space-y-5 mt-4">
            <p class="text-gray-500 font-bold text-sm">பெயரை டைப் செய்து வெப்சைட்டை இப்போதே பாருங்கள்!</p>
            <input type="text" id="bizName" placeholder="நிறுவனத்தின் பெயர் (எ.கா: சரவணா ஸ்டோர்ஸ்)" class="w-full p-5 bg-gray-50 border-2 border-blue-100 rounded-2xl focus:border-blue-500 outline-none shadow-inner font-bold text-center">
            
            <button onclick="build()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl transform active:scale-95 transition-all text-xl uppercase">
                இலவசமாக உருவாக்கு 🚀
            </button>
        </div>

        <div id="result" class="hidden p-6 animate-in slide-in-from-bottom duration-500">
            <div class="border-4 border-dashed border-blue-400 p-8 rounded-[30px] bg-blue-50 relative shadow-inner text-center">
                <h2 id="displayTitle" class="text-3xl font-black text-blue-900 uppercase"></h2>
                <p id="displayText" class="text-blue-700 mt-2 font-medium">சிறந்த சேவைகளுக்கு எங்களை உடனே அழையுங்கள்!</p>
                <div class="mt-6 flex gap-2 justify-center">
                    <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-black uppercase text-center">Active Now</span>
                    <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase text-center">Mobile Ready</span>
                </div>
            </div>
            
            <div class="mt-10 bg-black p-6 rounded-[30px] shadow-2xl border-t-4 border-yellow-400 text-center">
                <h3 class="font-black text-2xl text-yellow-400 uppercase mb-2 italic">லைவ் கொண்டு வர வேண்டுமா?</h3>
                <p class="text-xs text-white opacity-80 mb-6 font-bold uppercase">இந்த வெப்சைட்டை உங்கள் பெயரில் பெற வெறும் ₹99 மட்டும் செலுத்துங்கள்!</p>
                
                <button onclick="payNow()" class="w-full bg-yellow-400 text-black py-5 rounded-2xl font-black text-xl shadow-lg hover:bg-yellow-500 transition-colors uppercase text-center">
                    இப்பொழுதே பணம் செலுத்து 💳
                </button>
            </div>
        </div>
    </div>

    <script>
        function build() {
            const name = document.getElementById('bizName').value;
            if(!name) { alert("பெயரை உள்ளிடவும்!"); return; }
            document.getElementById('displayTitle').innerText = name;
            document.getElementById('result').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function payNow() {
            const name = document.getElementById('bizName').value;
            const msg = `வணக்கம்! நான் QuickFast ஆப் மூலம் என் பிசினஸிற்கு (${name}) வெப்சைட் உருவாக்க விரும்புகிறேன். ₹99 செலுத்த நான் தயார்!`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
